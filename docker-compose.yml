services:
  postgres:
    image: postgres:16
    container_name: ai_bot_postgres
    environment:
      POSTGRES_DB: ai_bot_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ai_bot_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: